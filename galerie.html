<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Galerie - Pascal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #1877f2; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 20px auto;
        }
        .grid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #1877f2; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Ma Galerie Photos</h1>
    <div class="grid">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=300" alt="Nature 1">
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=300" alt="Nature 2">
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=300" alt="Nature 3">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=300" alt="Nature 4">
    </div>
    <a href="index.html" class="back-btn">← Retour à l'accueil</a>
</body>
</html>
